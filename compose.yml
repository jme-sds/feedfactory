services:
  feedfactory:
    build: .
    container_name: feedfactory
    restart: unless-stopped
    network_mode: service:tailscale
    environment:
      #      - HF_TOKEN=${HF_TOKEN}
      #      - HF_SPACE=${HF_SPACE}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - TZ=America/New_York
    volumes:
      - ./data:/app/data  # Persist the SQLite DB and XML files
#    ports:
#      - "100.x.y.z:8000:8000"

  parser:
    image: wangqiru/mercury-parser-api:latest
    expose:
      - "3000"
    restart: unless-stopped

  tailscale:
    image: tailscale/tailscale:latest
    container_name: feedfactory-tailscale
    hostname: feedfactory
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:-tskey-auth-xxxxx}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_EXTRA_ARGS=--advertise-tags=tag:container
      - TS_SERVE_CONFIG=/config/serve.json
    volumes:
      - ./tailscale-data:/var/lib/tailscale
      - ./serve.json:/config/serve.json
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped
    extra_hosts:
      - "litellm.tailf87f44.ts.net:100.67.247.64"
