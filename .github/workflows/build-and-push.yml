name: build and push

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Grant write permissions for packages (GHCR)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Required for multi-architecture builds (e.g., for Raspberry Pi/Orange Pi)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Required for the registry caching backend you are using
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }} 
          password: ${{ secrets.GITHUB_TOKEN }} 

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Note: Ensure your repository name doesn't contain uppercase letters, 
          # otherwise hardcode the lowercase name here.
          images: ghcr.io/${{ github.repository }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: . 
          push: true
          platforms: linux/amd64,linux/arm64 # Added multi-arch support
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache,mode=max

