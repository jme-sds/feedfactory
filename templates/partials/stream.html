<!-- OOB NAV SWAP: Transforms the global navbar for the Stream view -->
<nav id="top-nav" class="container-fluid global-nav" hx-swap-oob="true">
    <ul style="padding-left: 0; align-items: center;">
        <li><button class="nav-badge-btn" hx-get="/reader/category/{{ category_id }}/feeds" hx-target="#reader-container" style="border: none;">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </button></li>
        <li><strong style="font-size: 1.1rem; color: #fff; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; max-width: 200px;">{{ category_name }}</strong></li>
    </ul>
    <ul style="gap: 8px; align-items: center;">
        <li style="margin: 0;">
            <details class="dropdown filter-menu" id="filter-dropdown" style="margin: 0; position: relative;">
                <summary role="button" class="nav-badge-btn" id="unread-badge-btn" title="Filter Stream" style="border: none;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
                </summary>
                <div style="position: absolute; right: 0; top: 100%; margin-top: 10px; width: 300px; background: #141414; border: 1px solid #444; border-radius: 8px; box-shadow: 0 8px 32px rgba(0,0,0,0.9); padding: 1.2rem; z-index: 100; text-align: left; cursor: default;" onclick="event.stopPropagation()">
                    <h6 style="margin-bottom: 1rem; color: #fff; border-bottom: 1px solid #333; padding-bottom: 0.5rem;">Filter Stream</h6>
                    <label style="font-size: 0.85rem; color: #aaa; margin-bottom: 0.5rem; display: block;">Read Status
                        <select id="filter-status" style="margin-top: 4px; font-size: 0.9rem; padding: 6px;">
                            <option value="unread">Unread Only</option>
                            <option value="all">Show All Articles</option>
                            <option value="read">Read Only</option>
                        </select>
                    </label>
                    <label style="font-size: 0.85rem; color: #aaa; margin-bottom: 0.5rem; display: block;">Includes Keywords
                        <input type="text" id="filter-include" placeholder="e.g. AI, Space" style="margin-top: 4px; font-size: 0.9rem; padding: 6px;">
                    </label>
                    <label style="font-size: 0.85rem; color: #aaa; margin-bottom: 0.5rem; display: block;">Excludes Keywords
                        <input type="text" id="filter-exclude" placeholder="e.g. Politics" style="margin-top: 4px; font-size: 0.9rem; padding: 6px;">
                    </label>
                    <label style="font-size: 0.85rem; color: #aaa; margin-bottom: 1.5rem; display: block;">Published Since
                        <input type="date" id="filter-date" style="margin-top: 4px; font-size: 0.9rem; padding: 6px;">
                    </label>
                    <div style="display: flex; justify-content: space-between; gap: 10px;">
                        <button class="secondary outline" style="padding: 6px 12px; font-size: 0.85rem; margin: 0; flex-grow: 1;" onclick="clearFilters()">Clear</button>
                        <button style="padding: 6px 12px; font-size: 0.85rem; margin: 0; flex-grow: 1;" onclick="applyFilters()">Apply</button>
                    </div>
                </div>
            </details>
        </li>
        <li style="margin: 0;">
            <button class="nav-badge-btn" id="select-mode-btn" onclick="toggleSelectMode()" title="Select Articles">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"></rect><path d="m9 12 2 2 4-4"></path></svg>
            </button>
        </li>
        <li style="margin: 0;">
            {% if feed_id %}
            <button class="nav-badge-btn" hx-post="/reader/mark_feed_read" hx-vals='{"category_id": "{{ category_id }}", "feed_id": "{{ feed_id }}"}' hx-target="#reader-container" title="Mark Feed Read" style="border: none;">
            {% else %}
            <button class="nav-badge-btn" hx-post="/reader/mark_category_read" hx-vals='{"category_id": "{{ category_id }}"}' hx-target="#reader-container" title="Mark Category Read" style="border: none;">
            {% endif %}
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </button>
        </li>
    </ul>
</nav>

<style>
    details.filter-menu { margin: 0 !important; padding: 0 !important; width: 34px; height: 34px; }
    details.filter-menu summary { list-style: none; margin: 0 !important; padding: 0 !important; }
    details.filter-menu[open] summary { margin-bottom: 0 !important; }
    details.filter-menu summary::after, details.filter-menu summary::-webkit-details-marker { display: none !important; }
    .article-card.article-selected {
        outline: 2px solid rgba(16, 149, 193, 0.9);
        background: rgba(16, 149, 193, 0.12) !important;
    }
    .select-checkbox {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
        cursor: pointer;
        accent-color: var(--primary);
        margin: 0;
        display: none;
    }
    #articles-list.select-mode-active .select-checkbox {
        display: block;
    }
</style>

<div id="multi-actions-bar"
     style="display:none; position: sticky; top: 10px; z-index: 1000; margin: 0 0 1rem 0; padding: 0.75rem; background: rgba(20, 20, 20, 0.95); border: 1px solid #444; border-radius: 12px;">
    <div style="display:flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap;">
        <div style="display:flex; align-items:center; gap: 0.75rem; flex-wrap: wrap;">
            <div style="color:#fff;">
                <strong><span id="selected-count">0</span></strong>
                <span style="color:#bbb;">selected</span>
            </div>
            <label style="display:flex; align-items:center; gap:0.5rem; color:#bbb; font-size:0.9rem; user-select:none;">
                <input id="scrape-before-summary" type="checkbox" onchange="updateBatchScrapeUI()" />
                Scrape before summary
            </label>
        </div>
        <div style="display:flex; gap: 0.5rem; align-items:center; flex-wrap: wrap;">
            <button id="mark-selected-read-btn" class="secondary outline" style="padding: 6px 12px; font-size: 0.85rem; margin: 0;" onclick="markSelectedAsRead()">Mark as read</button>
            <button id="summarize-selected-btn" style="padding: 6px 12px; font-size: 0.85rem; margin: 0;" onclick="summarizeSelectedArticles()">Summarize selected</button>
        </div>
    </div>
</div>

<div id="articles-list" style="padding-bottom: 2rem;">
    {% for article in articles %}
    <article id="card-{{ article.ui_id }}" class="article-card {% if article.is_read %}article-read{% endif %}" 
             data-timestamp="{{ article.published }}" 
             data-ui-id="{{ article.ui_id }}"
             data-title="{{ article.title|forceescape }}"
             data-source="{{ article.source_title|forceescape }}"
             data-link="{{ article.link }}"
             data-is-read="{{ article.is_read }}"
             style="padding: 0.75rem 0.5rem; border-bottom: 1px solid #222; margin-bottom: 0; cursor: pointer; transition: background 0.15s; {% if article.is_read %}opacity: 0.4;{% endif %}"
             onmouseover="this.style.background='rgba(255,255,255,0.03)'" 
             onmouseout="this.style.background='transparent'"
             onclick="openReader(this.dataset.uiId, this.dataset.title, this.dataset.source, this.dataset.link, this.dataset.isRead)">
        
        <div style="display: flex; align-items: flex-start; gap: 0.6rem;">
            <input type="checkbox"
                   class="select-checkbox"
                   data-link="{{ article.link }}"
                   data-ui-id="{{ article.ui_id }}"
                   onchange="toggleSelectedArticle(this)"
                   onclick="event.stopPropagation()"
                   style="margin-top: 0.25rem;" />
            <div style="flex: 1; min-width: 0;">
                <div class="meta" style="display: flex; justify-content: space-between; font-size: 0.75rem; color: #666; margin-bottom: 0.3rem;">
                    <span style="font-weight: 500; letter-spacing: 0.03em;">{{ article.source_title }}</span>
                    <span>{{ article.published_str }}</span>
                </div>
                <h4 style="margin: 0; font-size: 1.05rem; font-weight: 600; color: #eee; line-height: 1.3;">
                    {{ article.title }}
                </h4>
            </div>
        </div>
        
        <template id="content-{{ article.ui_id }}">{{ article.display_body|safe }}</template>
    </article>
    {% endfor %}

    {% if not articles %}
    <div style="text-align: center; padding: 4rem; color: #666;">
        <p>No articles found in this stream.</p>
    </div>
    {% endif %}
</div>

<script>
    const selectedArticles = new Set(); // stores article links
    let batchScrapeEnabled = true;
    let selectModeActive = false;

    function toggleSelectMode() {
        selectModeActive = !selectModeActive;
        const list = document.getElementById('articles-list');
        const btn = document.getElementById('select-mode-btn');
        if (selectModeActive) {
            list.classList.add('select-mode-active');
            if (btn) btn.classList.add('active');
        } else {
            list.classList.remove('select-mode-active');
            if (btn) btn.classList.remove('active');
            resetSelectionUI();
        }
    }

    function updateBatchScrapeUI() {
        const cb = document.getElementById('scrape-before-summary');
        batchScrapeEnabled = !!(cb && cb.checked);
    }

    function toggleSelectedArticle(checkboxEl) {
        const link = checkboxEl?.dataset?.link;
        if (!link) return;

        const card = checkboxEl.closest('.article-card');
        if (checkboxEl.checked) {
            selectedArticles.add(link);
            if (card) card.classList.add('article-selected');
        } else {
            selectedArticles.delete(link);
            if (card) card.classList.remove('article-selected');
        }

        const count = selectedArticles.size;
        const bar = document.getElementById('multi-actions-bar');
        const selectedCount = document.getElementById('selected-count');
        if (bar) bar.style.display = count > 0 ? 'block' : 'none';
        if (selectedCount) selectedCount.innerText = String(count);
    }

    function getSelectedLinks() {
        return Array.from(selectedArticles);
    }

    function applySelectionStylingFromCheckboxState() {
        document.querySelectorAll('.article-card').forEach(card => card.classList.remove('article-selected'));
        document.querySelectorAll('.select-checkbox').forEach(cb => {
            if (cb.checked) {
                const card = cb.closest('.article-card');
                if (card) card.classList.add('article-selected');
            }
        });
    }

    function resetSelectionUI() {
        selectedArticles.clear();
        document.querySelectorAll('.select-checkbox').forEach(cb => { cb.checked = false; });
        applySelectionStylingFromCheckboxState();
        const bar = document.getElementById('multi-actions-bar');
        if (bar) bar.style.display = 'none';
        const selectedCount = document.getElementById('selected-count');
        if (selectedCount) selectedCount.innerText = '0';
    }

    async function markSelectedAsRead() {
        const links = getSelectedLinks();
        if (!links.length) {
            alert('Select at least one article.');
            return;
        }

        const btn = document.getElementById('mark-selected-read-btn');
        const original = btn ? btn.innerText : '';
        if (btn) { btn.disabled = true; btn.innerText = 'Marking...'; }

        try {
            const formData = new FormData();
            formData.append('urls', links.join(','));
            const response = await fetch('/reader/mark_read_bulk', { method: 'POST', body: formData });
            if (!response.ok) throw new Error('Failed to mark as read.');

            // Update UI immediately
            const cards = document.querySelectorAll('.article-card');
            links.forEach(link => {
                for (const card of cards) {
                    if (card.dataset.link === link) {
                        card.classList.add('article-read');
                        card.style.opacity = '0.4';
                        break;
                    }
                }
            });

            resetSelectionUI();
        } catch (e) {
            console.error(e);
            alert('Could not mark selected articles as read.');
        } finally {
            if (btn) { btn.disabled = false; btn.innerText = original; }
        }
    }

    async function summarizeSelectedArticles() {
        const links = getSelectedLinks();
        if (!links.length) {
            alert('Select at least one article.');
            return;
        }

        const scrape = !!batchScrapeEnabled;

        const btn = document.getElementById('summarize-selected-btn');
        const original = btn ? btn.innerText : '';
        if (btn) { btn.disabled = true; btn.innerText = 'Summarizing...'; }

        try {
            const formData = new FormData();
            formData.append('urls', links.join(','));
            formData.append('scrape', scrape ? '1' : '0');

            const response = await fetch('/reader/summarize_articles', { method: 'POST', body: formData });
            if (!response.ok) throw new Error('Failed to generate summary.');
            const html = await response.text();

            const summaryContent = document.getElementById('summary-content');
            const summaryModal = document.getElementById('single-summary-modal');
            if (!summaryContent || !summaryModal) throw new Error('Summary modal not found.');
            summaryContent.innerHTML = html;
            summaryModal.showModal();
        } catch (e) {
            console.error(e);
            alert('Could not generate summary for selected articles. Check Docker logs.');
        } finally {
            if (btn) { btn.disabled = false; btn.innerText = original; }
        }
    }

    document.addEventListener("DOMContentLoaded", () => {
        updateBatchScrapeUI();
        applyFilters();
    });

    function applyFilters() {
        const status = document.getElementById('filter-status').value;
        const includeStr = document.getElementById('filter-include').value.toLowerCase();
        const excludeStr = document.getElementById('filter-exclude').value.toLowerCase();
        const dateStr = document.getElementById('filter-date').value;

        const includes = includeStr.split(',').map(s => s.trim()).filter(s => s);
        const excludes = excludeStr.split(',').map(s => s.trim()).filter(s => s);
        const filterDate = dateStr ? new Date(dateStr).getTime() : 0;

        const cards = document.querySelectorAll('.article-card');
        
        cards.forEach(card => {
            let show = true;
            const isRead = card.classList.contains('article-read');
            if (status === 'unread' && isRead) show = false;
            if (status === 'read' && !isRead) show = false;

            const text = card.textContent.toLowerCase();
            if (show && includes.length > 0) {
                const hasInclude = includes.some(kw => text.includes(kw));
                if (!hasInclude) show = false;
            }
            if (show && excludes.length > 0) {
                const hasExclude = excludes.some(kw => text.includes(kw));
                if (hasExclude) show = false;
            }

            if (show && filterDate > 0) {
                const dateAttr = card.getAttribute('data-timestamp');
                const cardTimestamp = dateAttr ? new Date(dateAttr).getTime() : 0;
                if (cardTimestamp > 0 && cardTimestamp < filterDate) show = false; 
            }
            card.style.display = show ? 'block' : 'none';
        });

        const btn = document.getElementById('unread-badge-btn');
        if (status !== 'all' || includes.length > 0 || excludes.length > 0 || dateStr) {
            btn.classList.add('active');
            btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>`;
        } else {
            btn.classList.remove('active');
            btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>`;
        }
        
        const dropdown = document.getElementById('filter-dropdown');
        if (dropdown && dropdown.hasAttribute('open')) dropdown.removeAttribute('open');
    }

    function clearFilters() {
        document.getElementById('filter-status').value = 'all';
        document.getElementById('filter-include').value = '';
        document.getElementById('filter-exclude').value = '';
        document.getElementById('filter-date').value = '';
        applyFilters();
    }
</script>
