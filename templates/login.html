<!DOCTYPE html>
<html data-theme="dark">
<head>
    <title>Feed Factory - Demo Login</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#141414">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #141414; }
        .login-card { width: 100%; max-width: 380px; padding: 2rem; }
        .logo-row { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 0.5rem; }
        .logo-row img { width: 36px; height: 36px; filter: brightness(0) invert(1); }
        .hint-box { background: rgba(16, 149, 193, 0.1); border: 1px solid rgba(16, 149, 193, 0.3); border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 1.5rem; font-size: 0.9rem; text-align: center; }
        .hint-box code { background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; font-size: 0.95em; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-row">
            <img src="/static/logo.svg" alt="Feed Factory Logo">
            <h2 style="margin: 0;">Feed Factory</h2>
        </div>
        <p style="text-align: center; color: #888; margin-bottom: 1.5rem; font-size: 0.9rem;">Demo Instance</p>

        <div class="hint-box">
            Username: <code>{{ demo_user }}</code> &nbsp; Password: <code>{{ demo_pass }}</code>
        </div>

        {% if error %}
        <p style="color: #ff4444; text-align: center; font-size: 0.9rem;">{{ error }}</p>
        {% endif %}

        <form method="post" action="/login">
            <input type="hidden" name="csrf_token" id="csrf-field" value="">
            <label>Username
                <input type="text" name="username" autocomplete="username" required autofocus>
            </label>
            <label>Password
                <input type="password" name="password" autocomplete="current-password" required>
            </label>
            <button type="submit" style="width: 100%; margin-top: 0.5rem;">Sign In</button>
        </form>
    </div>
    <script>
    (function() {
        var m = document.cookie.match(/(^|;\s*)csrf_token=([^;]+)/);
        if (m) document.getElementById('csrf-field').value = m[2];
    })();
    </script>
</body>
</html>
